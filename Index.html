<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Supermercado La Economía</title>
  </head>
  <body>
    <header class="hero">
      <h1>Supermercado La Economía</h1>
      <p>Encuentra productos frescos, buenos precios y las mejores ofertas.</p>
    </header>
    <nav class="navbar">
      <a href="#">Inicio</a>
      <a href="#">Ofertas</a>
      <a href="#">Contacto</a>
    </nav>
    <main class="container">
      <section class="card">
        <h2>Productos</h2>
        <div class="products">
          <div class="product-item">Arroz</div>
          <div class="product-item">Leche</div>
          <div class="product-item">Pan</div>
          <div class="product-item">Huevos</div>
        </div>
      </section>
      <section class="card">
        <h2>Galería</h2>
        <div class="gallery">
          <img src="image.png" alt="Arroz" />
          <img src="image.png" alt="Leche" />
        </div>
      </section>
      <section class="card">
        <h2>Precios</h2>
        <table>
          <thead>
            <tr>
              <th>Producto</th>
              <th>Precio</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Arroz</td>
              <td>$2</td>
            </tr>
            <tr>
              <td>Leche</td>
              <td>$1</td>
            </tr>
            <tr>
              <td>Pan</td>
              <td>$1.5</td>
            </tr>
          </tbody>
        </table>
      </section>
      <section class="card">
        <h2>Contacto</h2>
        <form class="contact-form">
          <input type="text" placeholder="Nombre" />
          <input type="email" placeholder="Correo" />
          <button type="submit">Enviar</button>
        </form>
      </section>
    </main>
  </body>
</html>
